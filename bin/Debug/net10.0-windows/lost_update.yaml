# lost_update.yaml
scenarios:
  - name: "Lost update"
    setup:
      - user1: "DROP TABLE IF EXISTS accounts;"
      - user1: "CREATE TABLE accounts (id INT PRIMARY KEY, balance INT);"
      - user1: "INSERT INTO accounts VALUES (1, 1000);"
    steps:
      - user1: "BEGIN;"
        comment: "user1 Start transaction"
      - user2: "BEGIN;"
        comment: "user2 Start transaction"
      - user1: "SELECT * FROM accounts WHERE id = 1;"
        comment: "user1 get 1000"
      - user2: "SELECT * FROM accounts WHERE id = 1;"
        comment: "user2 get 1000"
      - user1: "UPDATE accounts SET balance = 2000 WHERE id = 1;"
        comment: "user1 update id1 to 2000"
      - user1: "SELECT * FROM accounts WHERE id = 1;"
        comment: "user1 get 2000"
      - user2: "UPDATE accounts SET balance = 1500 WHERE id = 1;"
        comment: "user2 update id1 to 1500"
      - wait: "user2 is blocked, wait user1 to commit?"
      - user1: "COMMIT;"
        comment: "user1 commit, user2 can update"
      - wait: "What do you think if user2 commit?"
      - user2: "COMMIT;"
        comment: "user2 commit"
      - user1: "SELECT * FROM accounts WHERE id = 1;"
        comment: "user1 get 1500"
      - user2: "SELECT * FROM accounts WHERE id = 1;"
        comment: "user2 get 1500"