# non_repeatable_delete.yaml
scenarios:
  - name: "Non-Repeatable Delete"
    setup:
      - user1: "DROP TABLE IF EXISTS accounts;"
      - user1: "CREATE TABLE accounts (id INT PRIMARY KEY, balance INT);"
      - user1: "INSERT INTO accounts VALUES (1, 1000);"
    steps:
      - user1: "BEGIN;"
        comment: "user1 Start transaction"
      - user1: "SELECT * FROM accounts WHERE id = 1;"
        comment: "user1 get 1000"
      - user2: "BEGIN;"
        comment: "user2 Start transaction"
      - user2: "DELETE FROM accounts WHERE id = 1;"
        comment: "user2 delete id = 1"
      - user2: "COMMIT;"
        comment: "user2 delete! id = 1"
      - wait: "What do you think user1 will get?"
      - user1: "SELECT * FROM accounts WHERE id = 1;"
        comment: "user1 get nothing"
      
      
