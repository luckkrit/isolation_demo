scenarios:
  - name: "Lost update"
    profiles: ["postgres"]
    init:
      - "DROP TABLE IF EXISTS accounts;"
      - "CREATE TABLE accounts (id INT PRIMARY KEY, balance INT);"
      - "INSERT INTO accounts VALUES (1, 1000);"
    steps:
      - actor: user1
        sql: "BEGIN;"
        comment: "user1 Start transaction"
      - actor: user2
        sql: "BEGIN;"
        comment: "user2 Start transaction"
      - actor: user1
        sql: "SELECT * FROM accounts WHERE id = 1;"
        comment: "user1 get 1000"
      - actor: user2
        sql: "SELECT * FROM accounts WHERE id = 1;"
        comment: "user2 get 1000"
      - actor: user1
        sql: "UPDATE accounts SET balance = 2000 WHERE id = 1;"
        comment: "user1 update id1 to 2000"
      - actor: user1
        sql: "SELECT * FROM accounts WHERE id = 1;"
        comment: "user1 get 2000"
      - actor: user2
        sql: "UPDATE accounts SET balance = 1500 WHERE id = 1;"
        comment: "user2 update id1 to 1500"
      - wait: "user2 is blocked, wait user1 to commit?"
      - actor: user1
        sql: "COMMIT;"
        comment: "user1 commit, user2 can update"
      - wait: "What do you think if user2 commit?"
      - actor: user2
        sql: "COMMIT;"
        comment: "user2 commit"
      - actor: user1
        sql: "SELECT * FROM accounts WHERE id = 1;"
        comment: "user1 get 1500"
      - actor: user2
        sql: "SELECT * FROM accounts WHERE id = 1;"
        comment: "user2 get 1500"
