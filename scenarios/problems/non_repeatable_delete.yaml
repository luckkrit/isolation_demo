scenarios:
  - name: "Non-Repeatable Delete"
    profiles: ["postgres"]
    init:
      - "DROP TABLE IF EXISTS accounts;"
      - "CREATE TABLE accounts (id INT PRIMARY KEY, balance INT);"
      - "INSERT INTO accounts VALUES (1, 1000);"
    steps:
      - actor: user1
        sql: "BEGIN;"
        comment: "user1 Start transaction"
      - actor: user1
        sql: "SELECT * FROM accounts WHERE id = 1;"
        comment: "user1 get 1000"
      - actor: user2
        sql: "BEGIN;"
        comment: "user2 Start transaction"
      - actor: user2
        sql: "DELETE FROM accounts WHERE id = 1;"
        comment: "user2 delete id = 1"
      - actor: user2
        sql: "COMMIT;"
        comment: "user2 delete! id = 1"
      - wait: "What do you think user1 will get?"
      - actor: user1
        sql: "SELECT * FROM accounts WHERE id = 1;"
        comment: "user1 get nothing"
