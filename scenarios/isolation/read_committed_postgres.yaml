scenarios:
  - name: "Read Committed : Solve Dirty Read Problem"
    profiles: ["postgres"]
    init:
      - "DROP TABLE IF EXISTS accounts;"
      - "CREATE TABLE accounts (id INT PRIMARY KEY, balance INT);"
      - "INSERT INTO accounts VALUES (10, 1000);"
    steps:
      - actor: user1
        sql: "BEGIN TRANSACTION ISOLATION LEVEL READ COMMITTED;"
        comment: "T1 start with READ COMMITTED"
      - actor: user1
        sql: "SET LOCAL statement_timeout = '5s';"
        comment: "T1 cancel if blocked more than 5 seconds"
      - actor: user1
        sql: "SELECT * FROM accounts;"
        comment: "T1 sees: id=10, balance=1000"
      - actor: user1
        sql: "UPDATE accounts SET balance = 100 WHERE id = 10;"
        comment: "T1 updates balance to 100 — NOT committed yet"
      - actor: user1
        sql: "SELECT * FROM accounts;"
        comment: "T1 sees own change: balance=100"
      - actor: user2
        sql: "BEGIN TRANSACTION ISOLATION LEVEL READ COMMITTED;"
        comment: "T2 start with READ COMMITTED"
      - actor: user2
        sql: "SET LOCAL statement_timeout = '5s';"
        comment: "T2 cancel if blocked more than 5 seconds"
      - actor: user2
        sql: "SELECT * FROM accounts;"
        comment: "T2 sees: balance=1000 (NOT 100) — dirty read prevented!"
      - actor: user2
        sql: "INSERT INTO accounts VALUES (20, 1000);"
        comment: "T2 inserts row (20, 1000) — NOT committed yet"
      - actor: user2
        sql: "SELECT * FROM accounts;"
        comment: "T2 sees own insert: id=10,20"
      - wait: "T1 cannot see T2's uncommitted insert. What will T1 see?"
      - actor: user1
        sql: "SELECT * FROM accounts;"
        comment: "T1 still sees only id=10 — T2 not committed yet"
      - actor: user1
        sql: "INSERT INTO accounts VALUES (20, 2000);"
        comment: "T1 tries to insert id=20 — will block waiting for T2!"
      - wait: "T1 is blocked! T2 holds id=20. What happens when T2 commits?"
      - actor: user2
        sql: "COMMIT;"
        comment: "T2 commits — T1 unblocked but id=20 already exists!"
      - actor: user1
        sql: "COMMIT;"
        comment: "T1 commit (or rollback due to duplicate key error)"