# phamtom_write.yaml
scenarios:
  - name: "Phantom Write (No Fix)"
    setup:
      - user1: "DROP TABLE IF EXISTS reservations;"
      - user1: "CREATE TABLE reservations (id SERIAL PRIMARY KEY, reserve_date DATE);"
    steps:
      - user1: "BEGIN;"
        comment: "user1 Start transaction"
      - user1: "SELECT COUNT(*) from reservations WHERE reserve_date = '2025-01-10';"
        comment: "user1 gets 0 rows"
      - user2: "BEGIN;"
        comment: "user2 Start transaction"
      - user2: "SELECT COUNT(*) from reservations WHERE reserve_date = '2025-01-10';"
        comment: "user2 gets 0 rows"
      - user1: "INSERT INTO reservations(reserve_date) VALUES('2025-01-10');"
        comment: "user1 insert reserve date '2025-01-10'"
      - user1: "COMMIT;"
        comment: "user1 commit!"
      - user2: "INSERT INTO reservations(reserve_date) VALUES('2025-01-10');"
        comment: "user2 insert reserve date '2025-01-10', it is more than 1"
      - user2: "COMMIT;"
        comment: "user2 commit!"
      - wait: "What do you think?"
      - user1: "SELECT COUNT(*) from reservations WHERE reserve_date = '2025-01-10';"
        comment: "user1 gets 2 rows!"
  - name: "Phantom Write (Fix!)"
    setup:
      - user1: "DROP TABLE IF EXISTS reservations;"
      - user1: "CREATE TABLE reservations (id SERIAL PRIMARY KEY, reserve_date DATE UNIQUE);"
    steps:
      - user1: "BEGIN;"
        comment: "user1 Start transaction"
      - user1: "SELECT COUNT(*) from reservations WHERE reserve_date = '2025-01-10';"
        comment: "user1 gets 0 rows"
      - user2: "BEGIN;"
        comment: "user2 Start transaction"
      - user2: "SELECT COUNT(*) from reservations WHERE reserve_date = '2025-01-10';"
        comment: "user2 gets 0 rows"
      - user1: "INSERT INTO reservations(reserve_date) VALUES('2025-01-10');"
        comment: "user1 insert reserve date '2025-01-10'"
      - user1: "COMMIT;"
        comment: "user1 commit!"
      - user2: "INSERT INTO reservations(reserve_date) VALUES('2025-01-10');"
        comment: "user2 insert reserve date '2025-01-10', it is more than 1"
      - user2: "COMMIT;"
        comment: "user2 commit!"
      - wait: "What do you think?"
      - user1: "SELECT COUNT(*) from reservations WHERE reserve_date = '2025-01-10';"
        comment: "user1 gets 1 rows!"