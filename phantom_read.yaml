# phamtom_read.yaml
scenarios:
  - name: "Phantom Read"
    setup:
      - user1: "DROP TABLE IF EXISTS accounts;"
      - user1: "CREATE TABLE accounts (id INT PRIMARY KEY, balance INT);"
      - user1: "INSERT INTO accounts VALUES (1, 110000);"
      - user1: "INSERT INTO accounts VALUES (2, 120000);"
      - user1: "INSERT INTO accounts VALUES (3, 170000);"
      - user1: "INSERT INTO accounts VALUES (4, 1300);"
    steps:
      - user1: "BEGIN;"
        comment: "user1 Start transaction"
      - user1: "SELECT COUNT(*) from accounts WHERE balance > 100000;"
        comment: "user1 gets 3 rows"
      - user2: "BEGIN;"
        comment: "user2 Start transaction"
      - user2: "INSERT INTO accounts(id, balance) VALUES (5, 180000);"
        comment: "user2 insert another row with balance 180000"
      - user2: "COMMIT;"
        comment: "user2 commit"
      - wait: "How many rows when balance > 100000 ?"
      - user1: "SELECT COUNT(*) from accounts WHERE balance > 100000;"
        comment: "user1 gets 4 rows"
      