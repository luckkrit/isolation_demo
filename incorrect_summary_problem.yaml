# incorrect_summary_problem.yaml
scenarios:
  - name: "Incorrect Summary Problem"
    setup:
      - user1: "DROP TABLE IF EXISTS accounts;"
      - user1: "CREATE TABLE accounts (id INT PRIMARY KEY, name TEXT, balance INT);"
      - user1: "INSERT INTO accounts VALUES (1, 'A', 1000), (2, 'B', 1000), (3, 'C', 1000);"
    steps:
      - user2: "BEGIN;"
        comment: "T2 start - will calculate SUM/AVG"
      - user2: "SELECT SUM(balance), AVG(balance) FROM accounts WHERE id = 3;"
        comment: "T2 read C = 1000, sum = 1000"
      - user1: "BEGIN;"
        comment: "T1 start - will update A and B"
      - user1: "UPDATE accounts SET balance = 950 WHERE id = 1;"
        comment: "T1 A = 1000 - 50 = 950"
      - user1: "COMMIT;"
        comment: "T1 commit A"
      - wait: "T1 committed A=950, now T2 reads A"
      - user2: "SELECT SUM(balance), AVG(balance) FROM accounts WHERE id IN (1,3);"
        comment: "T2 read A = 950 (after update!) sum = 1950"
      - user1: "BEGIN;"
      - user1: "UPDATE accounts SET balance = 1050 WHERE id = 2;"
        comment: "T1 B = 1000 + 50 = 1050"
      - user2: "SELECT SUM(balance), AVG(balance) FROM accounts WHERE id IN (1,2,3);"
        comment: "T2 read B = 1000 (before T1 updates!) avg = 983.33 WRONG!"
      - user2: "COMMIT;"
      - user1: "COMMIT;"
      - wait: "Correct avg should be 1000 but T2 got 983.33!"
      - user1: "SELECT AVG(balance) FROM accounts;"
        comment: "Real avg = 1000"