# dirty_read_mysql.yaml
scenarios:
  - name: "Dirty Read - READ UNCOMMITTED (CASE 1 Commit)"
    setup:
      - user1: "DROP TABLE IF EXISTS account;"
      - user1: "CREATE TABLE account (id INT PRIMARY KEY, balance INT);"
      - user1: "INSERT INTO account VALUES (1, 1000), (2, 2000), (3, 3000);"
      - user1: "SET SESSION TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;"
        comment: "user1 set isolation to READ UNCOMMITTED"
      - user1: "SHOW VARIABLES LIKE 'transaction_isolation';"
        comment: "user1 verify: should show READ-UNCOMMITTED"
      - user2: "SET SESSION TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;"
        comment: "user2 set isolation to READ UNCOMMITTED"
      - user2: "SHOW VARIABLES LIKE 'transaction_isolation';"
        comment: "user2 verify: should show READ-UNCOMMITTED"
    steps:
      - user1: "START TRANSACTION;"
        comment: "user1 starts transaction"
      - user1: "INSERT INTO account VALUES (10, 1000);"
        comment: "user1 inserts row (10, 1000) — NOT committed yet"
      - user1: "SELECT * FROM account;"
        comment: "user1 sees: 1,2,3,10"
      - user2: "START TRANSACTION;"
        comment: "user2 starts transaction"
      - user2: "SELECT * FROM account;"
        comment: "user2 sees: 1,2,3,10 — DIRTY READ! user1 not committed yet"
      - user2: "INSERT INTO account VALUES (11, 1100);"
        comment: "user2 inserts row (11, 1100) — NOT committed yet"
      - user1: "SELECT * FROM account;"
        comment: "user1 sees: 1,2,3,10,11 — DIRTY READ! user2 not committed yet"
      - user1: "COMMIT;"
        comment: "user1 commits"
      - user2: "COMMIT;"
        comment: "user2 commits"